<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do Card</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://kit.fontawesome.com/1ca828a5fe.js" crossorigin="anonymous"></script>
</head>
<body>

<article class="card" data-testid="test-todo-card">

  <div class="row">
    <h3 class="title" data-testid="test-todo-title">Complete Project Deliverables</h3>

    <div class="priority-indicator high" data-testid="test-todo-priority-indicator">
      <span class="badge high" data-testid="test-todo-priority">High</span>
    </div>
  </div>

  <div class="desc-container">
    <div id="desc-section" data-testid="test-todo-collapsible-section">
      <p class="desc" data-testid="test-todo-description">
        Review and finalize all pending work items. Prioritize and address the most time-sensitive tasks immediately to meet deadlines.
      </p>
    </div>

    <button data-testid="test-todo-expand-toggle"
            aria-expanded="false"
            aria-controls="desc-section">
      Show more
    </button>
  </div>

  <ul class="row tags" role="list" data-testid="test-todo-tags">
    <li class="tag" data-testid="test-todo-tag-urgent">urgent</li>
    <li class="tag" data-testid="test-todo-tag-work">work</li>
  </ul>

  <div class="row detail-main-container">
    <div class="detail-sub-container">

      <time datetime="2026-04-10T16:21" data-testid="test-todo-due-date">
        <i class="fa-regular fa-calendar"></i>
        <span>Apr 10, 2026</span>
      </time>

      <time data-testid="test-todo-time-remaining" aria-live="polite">
        <i class="fa-regular fa-clock"></i>
        <span></span>
      </time>

      <span class="overdue hidden" data-testid="test-todo-overdue-indicator">
        Overdue
      </span>

    </div>

    <div class="status-container">
      <span class="status" data-testid="test-todo-status">In Progress</span>

      <select data-testid="test-todo-status-control" aria-label="Todo status">
        <option>Pending</option>
        <option selected>In Progress</option>
        <option>Done</option>
      </select>
    </div>
  </div>

  <div class="row actions">

    <div class="checkbox-container">
      <input type="checkbox" data-testid="test-todo-complete-toggle" id="checkbox">
      <label for="checkbox">Done</label>
    </div>

    <div class="btn-container">
      <button class="btn edit-btn" data-testid="test-todo-edit-button">
        <i class="fa-solid fa-pen"></i>
        <span>Edit</span>
      </button>

      <button class="btn delete-btn" data-testid="test-todo-delete-button">
        <i class="fa-solid fa-trash-can"></i>
        <span>Delete</span>
      </button>
    </div>

  </div>

</article>

<script src="app.js"></script>
</body>
</html>
